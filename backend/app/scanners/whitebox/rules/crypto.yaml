# Quantum Mythos — crypto-focused Semgrep rules.
# Two kinds of finding:
#   qm_kind: pqc_vulnerable -> inventory (quantum-vulnerable algorithm in source) -> crypto_asset
#   qm_kind: misuse         -> classical crypto bug exploitable TODAY            -> finding
rules:
  # ---------- PQC-vulnerable algorithm usage (the quantum inventory) ----------
  - id: qm-py-rsa-keygen
    languages: [python]
    severity: WARNING
    message: "Quantum-vulnerable RSA in use (Shor-breakable). Inventory for PQC migration (ML-KEM/ML-DSA)."
    metadata: {cwe: "CWE-327", qm_kind: pqc_vulnerable, qm_category: shor_broken, qm_algo: RSA}
    pattern-either:
      - pattern: rsa.generate_private_key(...)
      - pattern: RSA.generate(...)

  - id: qm-py-ec-keygen
    languages: [python]
    severity: WARNING
    message: "Quantum-vulnerable elliptic-curve crypto (Shor-breakable). Inventory for PQC migration."
    metadata: {cwe: "CWE-327", qm_kind: pqc_vulnerable, qm_category: shor_broken, qm_algo: ECDSA/EC}
    pattern-either:
      - pattern: ec.generate_private_key(...)
      - pattern: ECC.generate(...)

  - id: qm-js-asymmetric-keygen
    languages: [javascript, typescript]
    severity: WARNING
    message: "Quantum-vulnerable asymmetric key generation (Shor-breakable). Inventory for PQC migration."
    metadata: {cwe: "CWE-327", qm_kind: pqc_vulnerable, qm_category: shor_broken, qm_algo: RSA/EC}
    pattern-either:
      - pattern: crypto.generateKeyPair('rsa', ...)
      - pattern: crypto.generateKeyPairSync('rsa', ...)
      - pattern: crypto.generateKeyPair('ec', ...)
      - pattern: crypto.generateKeyPairSync('ec', ...)

  # ---------- classical crypto misuse (exploitable today) ----------
  - id: qm-weak-hash-md5-sha1
    languages: [python, javascript, typescript]
    severity: ERROR
    message: "Broken hash (MD5/SHA-1) used for security. Use SHA-256+ (or a real KDF for passwords)."
    metadata: {cwe: "CWE-327", qm_kind: misuse, qm_category: grover_weakened}
    pattern-either:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.sha1(...)
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash('sha1')

  - id: qm-ecb-mode
    languages: [python, javascript, typescript]
    severity: ERROR
    message: "ECB block-cipher mode leaks plaintext structure. Use an AEAD mode (AES-GCM)."
    metadata: {cwe: "CWE-327", qm_kind: misuse, qm_category: grover_weakened}
    pattern-either:
      - pattern: modes.ECB(...)
      - pattern: AES.new($K, AES.MODE_ECB, ...)
      - pattern: crypto.createCipheriv("=~/.*-ecb/i", ...)

  # Real secret formats only (gitleaks-style) — near-zero false positives, unlike
  # matching any variable named *secret*. These are unambiguous live credentials.
  - id: qm-hardcoded-secret
    languages: [generic]
    severity: ERROR
    message: "Hardcoded live secret/key in source — catastrophic if leaked."
    metadata: {cwe: "CWE-798", qm_kind: misuse, qm_category: unknown}
    pattern-either:
      - pattern-regex: "AKIA[0-9A-Z]{16}"
      - pattern-regex: "sk_live_[0-9a-zA-Z]{16,}"
      - pattern-regex: "ghp_[0-9A-Za-z]{36}"
      - pattern-regex: "AIza[0-9A-Za-z_\\-]{35}"
      - pattern-regex: "xox[baprs]-[0-9A-Za-z-]{10,}"
      - pattern-regex: "-----BEGIN [A-Z ]*PRIVATE KEY-----"
